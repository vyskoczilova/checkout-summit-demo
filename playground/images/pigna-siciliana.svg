<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#ffffff"/>
  <defs>
    <radialGradient id="scale" cx="0.35" cy="0.35" r="0.75">
      <stop offset="0%" stop-color="#f5e9a8"/>
      <stop offset="55%" stop-color="#d9b64a"/>
      <stop offset="100%" stop-color="#8a6a1a"/>
    </radialGradient>
    <radialGradient id="scaleRim" cx="0.35" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8a4a"/>
      <stop offset="100%" stop-color="#1f4d25"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <symbol id="petal" viewBox="-50 -30 100 60">
      <path d="M -50 0 Q -35 -30 0 -28 Q 35 -30 50 0 Q 35 30 0 28 Q -35 30 -50 0 Z" fill="url(#scale)" stroke="#5a3d0f" stroke-width="1.5"/>
      <path d="M -50 0 Q -35 -30 0 -28 Q 35 -30 50 0 Q 35 30 0 28 Q -35 30 -50 0 Z" fill="url(#scaleRim)"/>
    </symbol>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="400" cy="720" rx="210" ry="22" fill="url(#shadow)"/>

  <!-- leaves crown -->
  <g transform="translate(400,160)">
    <path d="M 0 20 Q -30 -40 -70 -80 Q -55 -20 -35 10 Z" fill="url(#leaf)" stroke="#153a18" stroke-width="2"/>
    <path d="M 0 20 Q 0 -50 -10 -110 Q 10 -50 10 -20 Z" fill="url(#leaf)" stroke="#153a18" stroke-width="2"/>
    <path d="M 0 20 Q 30 -40 70 -80 Q 55 -20 35 10 Z" fill="url(#leaf)" stroke="#153a18" stroke-width="2"/>
  </g>

  <!-- pinecone body: overlapping scales in diamond/oval layout -->
  <g>
    <!-- row 1 (top) -->
    <use href="#petal" x="400" y="210" width="80" height="48"/>
    <!-- row 2 -->
    <use href="#petal" x="360" y="250" width="80" height="48"/>
    <use href="#petal" x="440" y="250" width="80" height="48"/>
    <!-- row 3 -->
    <use href="#petal" x="330" y="295" width="90" height="54"/>
    <use href="#petal" x="400" y="295" width="90" height="54"/>
    <use href="#petal" x="470" y="295" width="90" height="54"/>
    <!-- row 4 -->
    <use href="#petal" x="305" y="345" width="100" height="60"/>
    <use href="#petal" x="385" y="345" width="100" height="60"/>
    <use href="#petal" x="465" y="345" width="100" height="60"/>
    <use href="#petal" x="495" y="345" width="100" height="60"/>
    <!-- row 5 widest -->
    <use href="#petal" x="290" y="400" width="110" height="66"/>
    <use href="#petal" x="370" y="400" width="110" height="66"/>
    <use href="#petal" x="450" y="400" width="110" height="66"/>
    <use href="#petal" x="510" y="400" width="110" height="66"/>
    <!-- row 6 -->
    <use href="#petal" x="300" y="460" width="105" height="63"/>
    <use href="#petal" x="380" y="460" width="105" height="63"/>
    <use href="#petal" x="460" y="460" width="105" height="63"/>
    <use href="#petal" x="500" y="460" width="105" height="63"/>
    <!-- row 7 -->
    <use href="#petal" x="325" y="520" width="95" height="57"/>
    <use href="#petal" x="400" y="520" width="95" height="57"/>
    <use href="#petal" x="475" y="520" width="95" height="57"/>
    <!-- row 8 -->
    <use href="#petal" x="360" y="575" width="85" height="51"/>
    <use href="#petal" x="440" y="575" width="85" height="51"/>
    <!-- row 9 bottom -->
    <use href="#petal" x="400" y="625" width="75" height="45"/>
  </g>

  <!-- base knob -->
  <ellipse cx="400" cy="680" rx="40" ry="14" fill="#c79a3b" stroke="#5a3d0f" stroke-width="2"/>
  <ellipse cx="400" cy="678" rx="36" ry="8" fill="#f0d580" opacity="0.6"/>
</svg>
